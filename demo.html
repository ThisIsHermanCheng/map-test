<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Interactive Map - Demo</title>
    <link rel="stylesheet" href="demo.css">
</head>
<body>
    <div class="map-container">
        <div class="map-controls">
            <button id="zoom-in">+</button>
            <button id="zoom-out">-</button>
            <span id="zoom-level">Zoom: 13</span>
            <button id="toggle-demo" class="demo-toggle">Demo Mode</button>
        </div>
        <div id="map" class="map"></div>
        <div class="map-info">
            <div>Hong Kong Interactive Map - Demo Version</div>
            <div id="coordinates">Click on map to see coordinates</div>
            <div class="tile-info">Shows mock tiles when real service is unavailable</div>
        </div>
    </div>
    <script src="demo.js"></script>
</body>
</html>
